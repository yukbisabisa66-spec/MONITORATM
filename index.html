<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor - iOS 26 Edition</title>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-blue: #007AFF;
            --accent-gold: #FFD700;
            --accent-red: #FF453A;
            --accent-green: #32D74B;
            --text-main: #FFFFFF;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            min-height: 100vh; 
            background: radial-gradient(circle at top right, #1a2a6c, #b21f1f, #fdbb2d);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; 
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Container Utama ala iPhone Card */
        .glass-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            padding: 24px; 
            border-radius: 44px; /* iOS Superellipse style */
            border: 1px solid var(--glass-border);
            width: 92%; 
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h2 { font-weight: 700; font-size: 28px; letter-spacing: -0.5px; margin-bottom: 24px; text-align: center; }

        /* Menu Buttons ala iOS Control Center */
        .btn-menu { 
            width: 100%; margin-bottom: 16px; padding: 20px; 
            background: rgba(255, 255, 255, 0.1); 
            color: white; border: none; 
            border-radius: 22px; 
            font-weight: 600; font-size: 17px;
            cursor: pointer; transition: all 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-menu:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.2); }
        .btn-menu::after { content: '􀄫'; font-family: "SF Pro Text"; opacity: 0.5; }

        /* Area Tabel ala iOS List View */
        .filter-area { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 16px; border-radius: 18px; 
            margin-bottom: 20px; display: flex; 
            justify-content: space-between; align-items: center; 
        }

        .table-container {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: rgba(255, 255, 255, 0.05); padding: 14px; text-align: left; font-weight: 500; color: var(--accent-gold); }
        td { padding: 14px; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); }

        .warning { background: rgba(255, 69, 58, 0.15) !important; }
        .no-selisih { color: var(--accent-green); font-weight: 500; }
        .ada-selisih { color: var(--accent-red); font-weight: 700; }
        .row-hidden { display: none !important; }

        /* Select & Button ala iOS System Dialog */
        select { 
            background: rgba(255, 255, 255, 0.1); 
            color: white; border: none; padding: 8px 12px; 
            border-radius: 10px; font-size: 13px; outline: none;
            width: 85px; margin-bottom: 5px;
        }
        .btn-save { 
            background: var(--accent-blue); color: white; 
            border: none; padding: 8px 16px; border-radius: 10px; 
            font-weight: 600; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        /* Toggle Switch Premium */
        .switch { position: relative; width: 51px; height: 31px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: rgba(255,255,255,0.2); transition: .4s; border-radius: 31px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 27px; width: 27px; 
            left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        input:checked + .slider { background-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px; padding: 14px;
            width: 100%; border: none; color: white;
            font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        /* Animasi Loading */
        .loader { text-align: center; padding: 40px; font-size: 14px; opacity: 0.7; }

    </style>
</head>
<body>

<div class="glass-card">
    <div id="menu">
        <h2>Bankaltimtara</h2>
        <button class="btn-menu" onclick="muatData('Gersik', '0')">Unit Gersik</button>
        <button class="btn-menu" onclick="muatData('Maridan', '1565950302')">Unit Maridan</button>
    </div>

    <div id="detail" style="display:none;">
        <h3 id="unit-nama" style="margin-bottom: 20px; text-align: center; font-size: 20px;"></h3>
        
        <div class="filter-area">
            <span style="font-size: 14px; opacity: 0.9;">Focus Mode (Selisih)</span>
            <label class="switch">
                <input type="checkbox" id="toggleFilter" onchange="jalankanFilter()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Tgl</th><th>Status</th><th>Aksi</th></tr>
                </thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
        
        <button class="btn-back" onclick="location.reload()">􀰌 Kembali</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";
    let sheetSekarang = "";

    async function muatData(nama, gid) {
        sheetSekarang = nama;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('detail').style.display = 'block';
        document.getElementById('unit-nama').innerText = "ATM " + nama;
        const tb = document.getElementById('isi-tabel');
        tb.innerHTML = "<tr><td colspan='3' class='loader'>Menghubungkan ke Satellite...</td></tr>";

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const text = await res.text();
            const lines = text.split('\n').slice(1);
            tb.innerHTML = "";

            lines.forEach(line => {
                const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
                const tgl = col[1];
                const sel = col[2];
                const ket = (col[3] || "").toUpperCase();

                if (tgl && tgl !== "null") {
                    const isNoSelisih = (sel === "-" || sel === "0" || sel === "");
                    const isProblem = (!isNoSelisih && ket !== "DONE");
                    
                    tb.innerHTML += `
                        <tr class="${isProblem ? 'warning problem-row' : 'safe-row'}">
                            <td style="font-size: 12px; opacity: 0.8;">${tgl}</td>
                            <td class="${isNoSelisih ? 'no-selisih' : 'ada-selisih'}">
                                ${isNoSelisih ? '􀁢 Aman' : 'Rp ' + sel}
                            </td>
                            <td>
                                <select id="sel-${tgl}">
                                    <option value="" ${ket==""?'selected':''}>Set</option>
                                    <option value="DONE" ${ket=="DONE"?'selected':''}>DONE</option>
                                    <option value="PROSES" ${ket=="PROSES"?'selected':''}>PROSES</option>
                                </select>
                                <button class="btn-save" onclick="simpanKeSheet('${tgl}')">OK</button>
                            </td>
                        </tr>`;
                }
            });
        } catch (e) { tb.innerHTML = "<tr><td colspan='3' class='loader'>System Error. Cek Koneksi.</td></tr>"; }
    }

    async function simpanKeSheet(tgl) {
        const val = document.getElementById(`sel-${tgl}`).value;
        if(!val) return alert("Pilih status!");
        
        const btn = event.target;
        btn.innerText = "􀀁"; // Apple loading symbol
        btn.disabled = true;
        
        const fd = new FormData();
        fd.append('tanggal', tgl);
        fd.append('status', val);
        fd.append('sheetName', sheetSekarang);

        try {
            await fetch(WEB_APP_URL, { method: 'POST', body: fd, mode: 'no-cors' });
            alert("iCloud Synced: Berhasil diperbarui!");
            btn.innerText = "OK";
            btn.disabled = false;
        } catch (e) { 
            alert("Sync Failed!"); 
            btn.innerText = "OK";
            btn.disabled = false;
        }
    }

    function jalankanFilter() {
        const cek = document.getElementById('toggleFilter').checked;
        document.querySelectorAll('.safe-row').forEach(r => {
            r.classList.toggle('row-hidden', cek);
        });
    }
</script>
</body>
</html>
