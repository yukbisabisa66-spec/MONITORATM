<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ATM Monitor - Liquid Glass</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-gold: #FACC15;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --danger: #FF3B30;
            --success: #34C759;
            --island-bg: rgba(0, 0, 0, 0.85);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            min-height: 100vh; 
            background: #001f3f;
            background: linear-gradient(135deg, #001f3f, #003366, #084a86, #2c3e50);
            background-size: 400% 400%;
            animation: liquidBackground 15s ease infinite;
            display: flex; justify-content: center; align-items: center; padding: 20px; color: white;
            overflow-x: hidden;
        }

        @keyframes liquidBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dynamic Island Notification */
        .dynamic-island {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: var(--island-bg); backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 30px; width: 200px;
            display: none; align-items: center; justify-content: center;
            z-index: 1000; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: islandSpring 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: width 0.3s, border-radius 0.3s;
        }

        @keyframes islandSpring {
            0% { top: -50px; width: 50px; opacity: 0; }
            100% { top: 15px; width: 200px; opacity: 1; }
        }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            padding: 30px 24px; border-radius: 44px; 
            border: 1px solid var(--glass-border);
            width: 100%; max-width: 414px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
            transition: all 0.5s ease;
        }

        /* Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 15px;
        }

        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        h2 { font-weight: 800; font-size: 28px; text-align: center; margin-bottom: 30px; letter-spacing: -1px; }

        .btn-menu { 
            width: 100%; margin-bottom: 16px; padding: 22px; 
            background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border); 
            border-radius: 22px; color: white; font-weight: 600; font-size: 18px; 
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-menu:active { transform: scale(0.94); background: rgba(255,255,255,0.2); }

        .badge-ios {
            background: var(--danger); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 800;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.4);
        }

        .table-container { 
            background: rgba(0, 0, 0, 0.2); border-radius: 28px; overflow: hidden; margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--ios-gold); opacity: 0.8; }
        td { padding: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); text-align: center; font-size: 14px; }

        .ios-select {
            background: white; border-radius: 12px; border: none; padding: 6px 10px; font-weight: 600; color: #000; font-size: 13px;
        }

        .btn-ok {
            background: var(--ios-blue); border: none; padding: 8px 14px; border-radius: 12px; color: white; font-weight: 700;
        }

        /* Custom Toggle ala iOS */
        .ios-switch {
            width: 50px; height: 30px; appearance: none; background: rgba(255,255,255,0.2);
            border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s;
        }
        .ios-switch:checked { background: var(--success); }
        .ios-switch::before {
            content: ''; position: absolute; width: 26px; height: 26px; background: white;
            border-radius: 50%; top: 2px; left: 2px; transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .ios-switch:checked::before { transform: translateX(20px); }

        .row-hidden { display: none; }
        .warning { background: rgba(255, 59, 48, 0.12); }
    </style>
</head>
<body>

<div id="island" class="dynamic-island">
    <span style="color: var(--danger); font-size: 12px; font-weight: 700;">⚠️ ADA SELISIH</span>
</div>

<div class="glass-card" id="main-card">
    <div id="menu-view">
        <h2>Bankaltimtara</h2>
        <button id="btn-Gersik" class="btn-menu" onclick="muatData('Gersik', '0')">
            Unit Gersik <span>􀆊</span>
        </button>
        <button id="btn-Maridan" class="btn-menu" onclick="muatData('Maridan', '1565950302')">
            Unit Maridan <span>􀆊</span>
        </button>
    </div>

    <div id="detail-view" style="display: none;">
        <h3 id="nama-header" style="text-align: center; margin-bottom: 20px;"></h3>
        
        <div style="background: rgba(255,255,255,0.06); padding: 15px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="font-size: 14px; font-weight: 500;">Hanya Tampilkan Masalah</span>
            <input type="checkbox" id="filter" class="ios-switch" onchange="jalankanFilter()">
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>Tgl</th><th>Selisih</th><th>Status</th></tr></thead>
                <tbody id="data-tabel"></tbody>
            </table>
        </div>
        
        <button onclick="location.reload()" style="width: 100%; margin-top: 20px; padding: 18px; border-radius: 20px; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; font-weight: 600;">Kembali</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_APP = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";
    let currentSheet = "";

    window.onload = cekStatus;

    async function cekStatus() {
        const units = [{n: 'Gersik', g: '0'}, {n: 'Maridan', g: '1565950302'}];
        let hasError = false;

        for (let u of units) {
            try {
                const r = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${u.g}&t=${Date.now()}`);
                const data = await r.text();
                if (data.includes("DONE") === false && data.split('\n').length > 1) { 
                    // Logika sederhana jika ada data tapi tidak ada kata DONE
                    document.getElementById('btn-' + u.n).innerHTML += `<span class="badge-ios">!</span>`;
                    hasError = true;
                }
            } catch(e){}
        }
        if(hasError) document.getElementById('island').style.display = 'flex';
    }

    async function muatData(nama, gid) {
        currentSheet = nama;
        document.getElementById('menu-view').style.display = 'none';
        const detail = document.getElementById('detail-view');
        detail.style.display = 'block';
        document.getElementById('nama-header').innerText = nama;

        const body = document.getElementById('data-tabel');
        body.innerHTML = `<tr><td colspan="3" class="skeleton" style="height: 100px;"></td></tr>`;

        try {
            const r = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const text = await r.text();
            const baris = text.split('\n').slice(1);
            body.innerHTML = "";

            baris.forEach(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, ""));
                const tgl = col[1], sel = col[2], ket = (col[3] || "").toUpperCase();
                
                if (tgl) {
                    const isMasalah = (sel !== "0" && sel !== "-" && ket !== "DONE");
                    body.innerHTML += `
                        <tr class="${isMasalah ? 'warning error-row' : 'safe-row'}">
                            <td>${tgl}</td>
                            <td style="color: ${isMasalah ? '#FF9F0A' : '#34C759'}; font-weight: 700;">${sel}</td>
                            <td>
                                <select id="s-${tgl}" class="ios-select">
                                    <option value="DONE" ${ket=='DONE'?'selected':''}>DONE</option>
                                    <option value="PROSES" ${ket=='PROSES'?'selected':''}>PROSES</option>
                                    <option value="" ${!ket?'selected':''}>-</option>
                                </select>
                                <button class="btn-ok" onclick="simpan('${tgl}')">Ok</button>
                            </td>
                        </tr>
                    `;
                }
            });
        } catch(e) { body.innerHTML = "Error koneksi"; }
    }

    async function simpan(tgl) {
        const val = document.getElementById(`s-${tgl}`).value;
        const url = `${WEB_APP}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(currentSheet)}`;
        
        // Haptic-like effect
        if (window.navigator.vibrate) window.navigator.vibrate(50);
        
        event.target.innerText = "⏳";
        await fetch(url, { method: 'POST', mode: 'no-cors' });
        alert("Berhasil diperbarui");
        location.reload();
    }

    function jalankanFilter() {
        const aktif = document.getElementById('filter').checked;
        document.querySelectorAll('.safe-row').forEach(el => el.classList.toggle('row-hidden', aktif));
    }
</script>
</body>
</html>
