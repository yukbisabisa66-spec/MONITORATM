<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Supreme</title>
    <style>
        :root {
            --gold: #D4AF37; --gold-light: #F9E79F; --bg: #050505;
            --card: rgba(30, 30, 35, 0.8); --red: #FF3B30; --green: #34C759;
            --blue: #007AFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; }
        body { 
            background: var(--bg); color: white; min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1a1a2e, transparent);
            padding: 20px; display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 410px; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ANALYTICS GOLD THEME */
        .analytics-card {
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(0,0,0,0));
            backdrop-filter: blur(25px); border-radius: 35px; padding: 25px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 25px;
            border: 1px solid rgba(212,175,55,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .ring-container { position: relative; width: 90px; height: 90px; }
        svg { transform: rotate(-90deg); width: 90px; height: 90px; }
        circle { fill: none; stroke-width: 9; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255,255,255,0.05); }
        .circle-proc { stroke: var(--gold); stroke-dasharray: 251; stroke-dashoffset: 251; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .stat-info h3 { font-size: 24px; font-weight: 900; color: var(--gold-light); }
        .stat-info p { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; }

        /* FILTER SYSTEM */
        .filter-bar {
            display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px;
        }
        .filter-chip {
            padding: 8px 16px; border-radius: 20px; background: var(--card);
            font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .filter-chip.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* UNIT & ITEM CARDS */
        .card {
            background: var(--card); border-radius: 28px; padding: 22px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .unit-card { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .unit-card:active { transform: scale(0.96); }

        .item-row { margin-bottom: 12px; border-left: 0px solid var(--red); transition: 0.3s; }
        .is-problem { border-left: 4px solid var(--red); background: rgba(255,59,48,0.05); }

        .action-grid { display: grid; grid-template-columns: 1fr 65px; gap: 10px; margin-top: 15px; }
        select { 
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; color: white; padding: 12px; font-size: 14px; outline: none;
        }
        .btn-gold { 
            background: var(--gold); border: none; border-radius: 14px; 
            color: black; font-weight: 800; cursor: pointer;
        }

        .hidden { display: none !important; }
        .btn-back { color: var(--gold); text-decoration: none; font-weight: 700; display: inline-block; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-screen">
        <header style="margin-bottom: 30px; text-align: center;">
            <h1 style="font-size: 26px; font-weight: 900; letter-spacing: -1px;">ATM MONITOR</h1>
            <p style="color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: 4px;">BANKALTIMTARA</p>
        </header>

        <div class="analytics-card">
            <div class="ring-container">
                <svg><circle class="circle-bg" cx="45" cy="45" r="40"></circle><circle id="progress-ring" class="circle-proc" cx="45" cy="45" r="40"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:900; font-size:18px;" id="percent-txt">0%</div>
            </div>
            <div class="stat-info">
                <p>Global Reliability</p>
                <h3 id="summary-txt">Checking...</h3>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterUnits('all', this)">Semua Unit</div>
            <div class="filter-chip" onclick="filterUnits('problem', this)">Perlu Tindakan ⚠️</div>
            <div class="filter-chip" onclick="filterUnits('clear', this)">Clear ✅</div>
        </div>

        <div id="unit-list">
            <div class="card unit-card" data-status="loading" onclick="openUnit('Gersik', '0')">
                <div><h3 style="font-size:18px;">Unit Gersik</h3><p id="sub-Gersik" style="font-size:12px; opacity:0.5;">Loading...</p></div>
                <div id="badge-Gersik">􀆊</div>
            </div>
            <div class="card unit-card" data-status="loading" onclick="openUnit('Maridan', '1565950302')">
                <div><h3 style="font-size:18px;">Unit Maridan</h3><p id="sub-Maridan" style="font-size:12px; opacity:0.5;">Loading...</p></div>
                <div id="badge-Maridan">􀆊</div>
            </div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <a href="#" class="btn-back" onclick="location.reload()">← BACK TO DASHBOARD</a>
        <h2 id="title-detail" style="font-size: 24px; margin-bottom: 20px; color: var(--gold-light);">Unit Name</h2>
        
        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterItems('all', this)">Semua Tanggal</div>
            <div class="filter-chip" onclick="filterItems('issue', this)">Hanya Selisih</div>
        </div>

        <div id="items-container"></div>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";

    let globalTotal = 0, globalSafe = 0;

    window.onload = init;

    async function init() {
        await checkUnit('Gersik', '0');
        await checkUnit('Maridan', '1565950302');
        updateRing();
    }

    async function checkUnit(nama, gid) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        
        let issues = 0;
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const sel = (c[2]||"").replace(/"/g,"").trim();
            const ket = (c[3]||"").replace(/"/g,"").toUpperCase().trim();
            globalTotal++;
            if (sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE") issues++; else globalSafe++;
        });

        const card = document.querySelector(`[onclick="openUnit('${nama}', '${gid}')"]`);
        const sub = document.getElementById('sub-' + nama);
        const badge = document.getElementById('badge-' + nama);

        if(issues > 0) {
            sub.innerText = issues + " Masalah ditemukan";
            sub.style.color = "var(--red)";
            badge.innerHTML = "⚠️";
            card.setAttribute('data-status', 'problem');
        } else {
            sub.innerText = "Operasional Normal";
            sub.style.color = "var(--green)";
            badge.innerHTML = "✅";
            card.setAttribute('data-status', 'clear');
        }
    }

    function updateRing() {
        const percent = Math.round((globalSafe / globalTotal) * 100) || 0;
        const offset = 251 - (251 * percent / 100);
        document.getElementById('progress-ring').style.strokeDashoffset = offset;
        document.getElementById('percent-txt').innerText = percent + "%";
        document.getElementById('summary-txt').innerText = percent >= 90 ? "Excellent" : "Need Action";
    }

    function filterUnits(type, el) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.unit-card').forEach(card => {
            if(type === 'all') card.classList.remove('hidden');
            else if(card.getAttribute('data-status') === type) card.classList.remove('hidden');
            else card.classList.add('hidden');
        });
    }

    async function openUnit(nama, gid) {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = nama;
        const container = document.getElementById('items-container');
        container.innerHTML = "<p style='text-align:center; opacity:0.3; padding:40px;'>Accessing Ledger...</p>";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;
            const tgl = c[1], sel = c[2], ket = c[3].toUpperCase();
            const isProblem = (sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE");

            const div = document.createElement('div');
            div.className = `card item-row ${isProblem ? 'is-problem' : 'is-safe'}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:800; font-size:15px; letter-spacing:1px;">${tgl}</span>
                    <span style="font-size:13px; font-weight:900; color:${isProblem ? 'var(--red)' : 'var(--green)'}">
                        ${isProblem ? 'DIFF: Rp ' + sel : (ket === 'DONE' ? '✓ FINISHED' : '✓ CLEAR')}
                    </span>
                </div>
                <div class="action-grid">
                    <select id="sel-${tgl}">
                        <option value="" ${ket===""?'selected':''}>Update Status</option>
                        <option value="DONE" ${ket==="DONE"?'selected':''}>DONE</option>
                        <option value="PROSES" ${ket==="PROSES"?'selected':''}>PROSES</option>
                    </select>
                    <button class="btn-gold" onclick="save('${tgl}','${nama}',this)">OK</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function filterItems(type, el) {
        const chips = el.parentElement.querySelectorAll('.filter-chip');
        chips.forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.item-row').forEach(row => {
            if(type === 'all') row.classList.remove('hidden');
            else if(row.classList.contains('is-problem')) row.classList.remove('hidden');
            else row.classList.add('hidden');
        });
    }

    async function save(tgl, unit, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        if(!val) return;
        btn.innerText = "..";
        await fetch(`${WEB_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(unit)}`, {mode:'no-cors'});
        btn.innerText = "✓";
        setTimeout(() => openUnit(unit, unit==='Gersik'?'0':'1565950302'), 500);
    }
</script>
</body>
</html>
