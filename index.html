<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Supreme V8</title>
    <style>
        :root {
            --gold: #D4AF37; --gold-light: #F9E79F;
            --bg: #050505; --card: rgba(30, 30, 35, 0.9);
            --text: #ffffff; --subtext: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --red: #FF3B30; --green: #34C759;
            --ring-bg: rgba(255, 255, 255, 0.05);
            --accent: #007AFF;
        }

        [data-theme="light"] {
            --bg: #F2F2F7; --card: #ffffff;
            --text: #1C1C1E; --subtext: rgba(0, 0, 0, 0.5);
            --border: rgba(0, 0, 0, 0.05);
            --ring-bg: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        
        .app-container { width: 100%; max-width: 410px; position: relative; }

        /* THEME TOGGLE */
        .theme-toggle {
            position: absolute; top: 10px; right: 0;
            background: var(--card); border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; z-index: 10;
        }

        /* ANALYTICS */
        .analytics-card {
            background: linear-gradient(135deg, rgba(212,175,55,0.15), transparent);
            backdrop-filter: blur(20px); border-radius: 30px; padding: 20px;
            display: flex; align-items: center; gap: 20px; margin: 50px 0 25px;
            border: 1px solid var(--border);
        }

        .ring-container { position: relative; width: 75px; height: 75px; }
        svg { transform: rotate(-90deg); width: 75px; height: 75px; }
        circle { fill: none; stroke-width: 7; stroke-linecap: round; }
        .circle-bg { stroke: var(--ring-bg); }
        .circle-proc { stroke: var(--gold); stroke-dasharray: 251; stroke-dashoffset: 251; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* FILTER SYSTEM */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-chip {
            padding: 8px 16px; border-radius: 20px; background: var(--card);
            font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap;
            border: 1px solid var(--border); color: var(--text);
        }
        .filter-chip.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* CARDS */
        .card { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .unit-card { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .is-problem { border-left: 5px solid var(--red); background: rgba(255, 59, 48, 0.03); }

        .action-grid { display: grid; grid-template-columns: 1fr 65px; gap: 10px; margin-top: 15px; }
        select, input { 
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); padding: 12px; font-size: 14px; outline: none; width: 100%;
        }

        .btn-gold { background: var(--gold); border: none; border-radius: 12px; color: black; font-weight: 800; cursor: pointer; }
        .btn-gold:active { transform: scale(0.95); }
        
        /* FAB & MODAL */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--gold); border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; color: black; border: none; font-weight: bold;
            box-shadow: 0 10px 25px rgba(212,175,55,0.4); z-index: 100; cursor: pointer;
        }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content { background: var(--card); width: 90%; max-width: 350px; padding: 25px; border-radius: 30px; border: 1px solid var(--gold); }

        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="dark">

<div class="app-container">
    <div class="theme-toggle" onclick="toggleTheme()">🌙 Dark</div>

    <div id="menu-screen">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1 style="font-size: 24px; letter-spacing: -1px; font-weight: 900;">ATM MONITOR</h1>
            <p style="color: var(--gold); font-size: 9px; font-weight: 800; letter-spacing: 3px;">BANKALTIMTARA</p>
        </header>

        <div class="analytics-card">
            <div class="ring-container">
                <svg><circle class="circle-bg" cx="37" cy="37" r="32"></circle><circle id="progress-ring" class="circle-proc" cx="37" cy="37" r="32"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:900;" id="percent-txt">0%</div>
            </div>
            <div>
                <p style="font-size: 10px; color: var(--subtext); letter-spacing: 1px;">SISTEM RELIABILITY</p>
                <h3 id="summary-txt" style="color: var(--gold);">Syncing...</h3>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterUnits('all', this)">Semua Unit</div>
            <div class="filter-chip" onclick="filterUnits('problem', this)">Perlu Tindakan ⚠️</div>
        </div>

        <div id="unit-list">
            <div class="card unit-card" data-status="loading" onclick="openUnit('Gersik', '0')">
                <div><h3>Unit Gersik</h3><p id="sub-Gersik" style="font-size:12px; opacity:0.6;">Menghubungkan...</p></div>
                <div id="badge-Gersik">􀆊</div>
            </div>
            <div class="card unit-card" data-status="loading" onclick="openUnit('Maridan', '1565950302')">
                <div><h3>Unit Maridan</h3><p id="sub-Maridan" style="font-size:12px; opacity:0.6;">Menghubungkan...</p></div>
                <div id="badge-Maridan">􀆊</div>
            </div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--accent); font-weight:800; cursor:pointer; margin-bottom:15px; font-size: 14px;">← KEMBALI</button>
        <h2 id="title-detail" style="margin-bottom:20px; font-size: 26px; font-weight: 900;">Unit</h2>

        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterItems('all', this)">Semua Tanggal</div>
            <div class="filter-chip" onclick="filterItems('issue', this)">Hanya Selisih ⚠️</div>
        </div>

        <div id="items-container"></div>
        <button class="fab" onclick="showModal()">+</button>
    </div>
</div>

<div id="modalAdd" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:20px; color:var(--gold); text-align: center;">Input Data Baru</h3>
        
        <label style="font-size: 11px; color: var(--subtext); margin-left: 5px;">PILIH TANGGAL</label>
        <input type="date" id="in-tgl" style="margin-top: 5px; margin-bottom: 15px;">
        
        <label style="font-size: 11px; color: var(--subtext); margin-left: 5px;">JUMLAH SELISIH (Rp)</label>
        <input type="number" id="in-selisih" placeholder="Isi 0 jika nominal sesuai" style="margin-top: 5px; margin-bottom: 15px;">
        
        <label style="font-size: 11px; color: var(--subtext); margin-left: 5px;">STATUS AWAL</label>
        <select id="in-status" style="margin-top: 5px;">
            <option value="PROSES">🔴 PROSES</option>
            <option value="DONE">🟢 DONE</option>
        </select>

        <button class="btn-gold" id="btn-simpan" style="width:100%; padding:15px; margin-top:25px;" onclick="prosesTambah()">SIMPAN DATA</button>
        <button onclick="hideModal()" style="background:none; border:none; color:var(--subtext); width:100%; margin-top:15px; font-size: 13px;">Batalkan</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";

    let curUnit = "", curGid = "", gTotal = 0, gSafe = 0;

    window.onload = () => { 
        checkUnit('Gersik', '0'); 
        checkUnit('Maridan', '1565950302'); 
    };

    function toggleTheme() {
        const b = document.body;
        const icon = document.querySelector('.theme-toggle');
        const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        icon.innerHTML = isDark ? '☀️ Light' : '🌙 Dark';
    }

    async function checkUnit(nama, gid) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        let iss = 0;
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const sel = (c[2]||"").replace(/"/g,"").trim();
            const ket = (c[3]||"").replace(/"/g,"").toUpperCase().trim();
            gTotal++; 
            if(sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE") iss++; else gSafe++;
        });
        const card = document.querySelector(`[onclick="openUnit('${nama}', '${gid}')"]`);
        const sub = document.getElementById('sub-'+nama);
        const badge = document.getElementById('badge-'+nama);
        
        if(iss > 0) {
            sub.innerText = iss + " Masalah ditemukan";
            sub.style.color = "var(--red)";
            badge.innerHTML = "⚠️";
            card.setAttribute('data-status', 'problem');
        } else {
            sub.innerText = "Operasional Normal";
            sub.style.color = "var(--green)";
            badge.innerHTML = "✅";
            card.setAttribute('data-status', 'clear');
        }
        updateRing();
    }

    function updateRing() {
        const p = Math.round((gSafe/gTotal)*100) || 0;
        document.getElementById('progress-ring').style.strokeDashoffset = 251 - (251*p/100);
        document.getElementById('percent-txt').innerText = p + "%";
        document.getElementById('summary-txt').innerText = p >= 90 ? "Excellent" : "Need Action";
    }

    async function openUnit(nama, gid) {
        curUnit = nama; curGid = gid;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = "Unit " + nama;
        const container = document.getElementById('items-container');
        container.innerHTML = "<p style='text-align:center; opacity:0.3; padding:40px;'>Membuka Ledger...</p>";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;
            const tgl = c[1], sel = c[2], ket = c[3].toUpperCase();
            const isProblem = (sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE");

            const div = document.createElement('div');
            div.className = `card item-row ${isProblem ? 'is-problem' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:800; font-size:15px;">${tgl}</span>
                    <span style="font-weight:900; font-size:13px; color:${isProblem ? 'var(--red)' : 'var(--green)'}">
                        ${isProblem ? 'DIFF: Rp '+sel : (ket==='DONE'?'✓ SELESAI':'✓ AMAN')}
                    </span>
                </div>
                <div class="action-grid">
                    <select id="sel-${tgl}">
                        <option value="DONE" ${ket==='DONE'?'selected':''}>DONE</option>
                        <option value="PROSES" ${ket==='PROSES'?'selected':''}>PROSES</option>
                    </select>
                    <button class="btn-gold" onclick="save('${tgl}','${nama}',this)">Ok</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function filterUnits(type, el) {
        document.querySelectorAll('#menu-screen .filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.unit-card').forEach(card => {
            if(type === 'all') card.classList.remove('hidden');
            else if(card.getAttribute('data-status') === type) card.classList.remove('hidden');
            else card.classList.add('hidden');
        });
    }

    function filterItems(type, el) {
        document.querySelectorAll('#detail-screen .filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.item-row').forEach(row => {
            if(type === 'all') row.classList.remove('hidden');
            else if(row.classList.contains('is-problem')) row.classList.remove('hidden');
            else row.classList.add('hidden');
        });
    }

    function showModal() { document.getElementById('modalAdd').style.display = 'flex'; }
    function hideModal() { document.getElementById('modalAdd').style.display = 'none'; }

    async function prosesTambah() {
        const rawDate = document.getElementById('in-tgl').value;
        const sel = document.getElementById('in-selisih').value;
        const stat = document.getElementById('in-status').value;
        const btn = document.getElementById('btn-simpan');

        if(!rawDate) return alert("Pilih tanggal!");

        // Format Date ke DD/MM/YYYY
        const d = new Date(rawDate);
        const formattedDate = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;

        btn.innerText = "Processing...";
        btn.disabled = true;

        await fetch(`${WEB_URL}?action=tambah&tanggal=${encodeURIComponent(formattedDate)}&selisih=${sel}&status=${stat}&sheetName=${curUnit}`, {mode:'no-cors'});
        
        hideModal();
        btn.innerText = "SIMPAN DATA";
        btn.disabled = false;
        // Reset inputs
        document.getElementById('in-tgl').value = "";
        document.getElementById('in-selisih').value = "";
        
        openUnit(curUnit, curGid);
    }

    async function save(tgl, unit, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        btn.innerText = "..";
        await fetch(`${WEB_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(unit)}`, {mode:'no-cors'});
        btn.innerText = "✓";
        setTimeout(() => openUnit(unit, curGid), 500);
    }
</script>
</body>
</html>
