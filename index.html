<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor - Bankaltimtara</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-gold: #FFD60A;
            --danger: #FF453A;
            --success: #32D74B;
            /* Efek Kaca Premium */
            --glass: rgba(255, 255, 255, 0.12);
            --glass-thick: rgba(255, 255, 255, 0.2);
            --border: rgba(255, 255, 255, 0.25);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
        }

        body { 
            min-height: 100vh; 
            /* Latar belakang Liquid Mesh yang lebih kontras */
            background: radial-gradient(circle at 0% 0%, #003366 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #001f3f 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, #005bb7 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #facc15 0%, transparent 50%),
                        #002855;
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; padding: 15px; color: white;
            overflow-x: hidden;
        }

        /* Dynamic Island - Notifikasi Melayang */
        .island-notif {
            position: fixed; top: 15px; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 25px; border-radius: 30px; font-weight: 700; font-size: 13px;
            color: var(--danger); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: none; z-index: 999; animation: dropDown 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes dropDown { from { transform: translateY(-100px) scale(0.5); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        .glass-card { 
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            padding: 30px 20px; border-radius: 40px; 
            border: 1px solid var(--border);
            width: 100%; max-width: 400px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3), inset 0 0 10px rgba(255,255,255,0.1);
        }

        h2 { font-weight: 800; font-size: 30px; text-align: center; margin-bottom: 30px; letter-spacing: -1px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }

        /* Menu Button ala iOS App */
        .btn-menu { 
            width: 100%; margin-bottom: 15px; padding: 22px; 
            background: var(--glass-thick); color: white; 
            border: 1px solid var(--border); border-radius: 24px; 
            font-weight: 600; font-size: 18px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-menu:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }

        .badge-danger {
            background: var(--danger); padding: 5px 12px; border-radius: 15px; font-size: 11px; font-weight: 800;
            box-shadow: 0 4px 12px rgba(255, 69, 58, 0.4);
        }

        /* Detail View Styles */
        .table-container { 
            background: rgba(0, 0, 0, 0.2); border-radius: 28px; overflow: hidden; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: rgba(255,255,255,0.05); padding: 15px; color: var(--ios-gold); font-weight: 700; text-transform: uppercase; font-size: 11px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }

        .safe { color: var(--success); font-weight: 600; }
        .danger-text { color: var(--danger); font-weight: 800; }

        select { 
            background: white; border: none; padding: 8px; border-radius: 10px; font-weight: 600; font-size: 12px;
        }

        .btn-save { 
            background: var(--ios-blue); border: none; color: white; 
            padding: 8px 15px; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        .btn-back { 
            background: transparent; border: 1.5px solid var(--border); 
            width: 100%; padding: 16px; border-radius: 20px; color: white; 
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        /* Toggle ala iOS */
        .switch-container {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.08); padding: 12px 18px; border-radius: 18px; margin-bottom: 15px;
        }
        .ios-switch {
            position: relative; width: 50px; height: 30px; appearance: none;
            background: rgba(255,255,255,0.3); border-radius: 20px; cursor: pointer; transition: 0.4s;
        }
        .ios-switch:checked { background: var(--success); }
        .ios-switch::before {
            content: ''; position: absolute; width: 26px; height: 26px; background: white;
            border-radius: 50%; top: 2px; left: 2px; transition: 0.4s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        .ios-switch:checked::before { transform: translateX(20px); }

    </style>
</head>
<body>

<div id="island" class="island-notif">⚠️ ATM ADA SELISIH</div>

<div class="glass-card">
    <div id="menu">
        <h2>Bankaltimtara</h2>
        <button id="btn-Gersik" class="btn-menu" onclick="muatData('Gersik', '0')">
            Unit Gersik <span>􀆊</span>
        </button>
        <button id="btn-Maridan" class="btn-menu" onclick="muatData('Maridan', '1565950302')">
            Unit Maridan <span>􀆊</span>
        </button>
    </div>

    <div id="detail" style="display:none;">
        <h3 id="unit-title" style="text-align:center; margin-bottom:20px; font-weight: 700;"></h3>
        
        <div class="switch-container">
            <span style="font-size: 14px; opacity: 0.9;">Hanya Selisih</span>
            <input type="checkbox" id="toggle" class="ios-switch" onchange="filterData()">
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>Tgl</th><th>Selisih</th><th>Status</th></tr></thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
        <button class="btn-back" onclick="location.reload()">KEMBALI</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_APP = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";
    let currentUnit = "";

    window.onload = checkAllUnits;

    async function checkAllUnits() {
        const u = [{n:'Gersik', g:'0'}, {n:'Maridan', g:'1565950302'}];
        let globalAlert = false;
        for(let item of u) {
            try {
                const r = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${item.g}&t=${Date.now()}`);
                const t = await r.text();
                if(t.includes("PROSES") || (t.match(/,/g).length > 5 && !t.includes("DONE"))) {
                    document.getElementById('btn-'+item.n).innerHTML += `<span class="badge-danger">!</span>`;
                    globalAlert = true;
                }
            } catch(e){}
        }
        if(globalAlert) document.getElementById('island').style.display = 'block';
    }

    async function muatData(nama, gid) {
        currentUnit = nama;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('detail').style.display = 'block';
        document.getElementById('unit-title').innerText = "Unit " + nama;
        const tb = document.getElementById('isi-tabel');
        tb.innerHTML = "<tr><td colspan='3' style='padding:40px; opacity:0.5;'>Memuat...</td></tr>";

        try {
            const r = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const text = await r.text();
            const lines = text.split('\n').slice(1);
            tb.innerHTML = "";

            lines.forEach(line => {
                const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
                const tgl = col[1], sel = col[2], ket = (col[3] || "").toUpperCase();
                if(tgl) {
                    const isAman = (sel == "0" || sel == "-" || sel == "");
                    const isProblem = (!isAman && ket !== "DONE");
                    tb.innerHTML += `
                        <tr class="${isProblem ? 'danger-row' : 'safe-row'}">
                            <td style="font-weight:500;">${tgl}</td>
                            <td class="${isAman ? 'safe' : 'danger-text'}">${isAman ? 'Aman' : 'Rp '+sel}</td>
                            <td>
                                <div style="display:flex; gap:5px; justify-content:center;">
                                    <select id="sel-${tgl}"><option value="DONE" ${ket=='DONE'?'selected':''}>DONE</option><option value="PROSES" ${ket=='PROSES'?'selected':''}>PROSES</option></select>
                                    <button class="btn-save" onclick="saveStatus('${tgl}')">Ok</button>
                                </div>
                            </td>
                        </tr>`;
                }
            });
        } catch(e) { tb.innerHTML = "Gagal memuat."; }
    }

    async function saveStatus(tgl) {
        const s = document.getElementById(`sel-${tgl}`).value;
        const btn = event.target; btn.innerText = "...";
        try {
            await fetch(`${WEB_APP}?tanggal=${tgl}&status=${s}&sheetName=${currentUnit}`, {method:'POST', mode:'no-cors'});
            alert("Data Disimpan");
            location.reload();
        } catch(e) { alert("Gagal!"); btn.innerText = "Ok"; }
    }

    function filterData() {
        const isChecked = document.getElementById('toggle').checked;
        document.querySelectorAll('.safe-row').forEach(row => {
            row.style.display = isChecked ? 'none' : 'table-row';
        });
    }
</script>
</body>
</html>
